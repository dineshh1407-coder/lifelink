<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donors - LifeLink</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  background:#0f0f0f;
  color:white;
  font-family:Poppins,sans-serif;
  padding:40px;
}

h1{
  text-align:center;
  color:#ff3b3b;
  margin-bottom:30px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
  gap:20px;
}

select{
  padding:15px;
  border:none;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
  width:250px;
}

.clear-btn{
  background:red;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
}

.donor{
  background:#1a1a1a;
  padding:25px;
  border-radius:20px;
  margin-bottom:20px;
}

.donor h2{
  color:#ff3b3b;
  margin-bottom:10px;
}

.request-btn{
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff3b3b;
  color:white;
  cursor:pointer;
}

</style>

</head>

<body>

<h1>🩸 Blood Donors</h1>

<div class="top-bar">

<select id="bloodFilter" onchange="filterDonors()">

<option value="all">All Blood Groups</option>

<option value="O+">O+</option>
<option value="O-">O-</option>

<option value="A+">A+</option>
<option value="A-">A-</option>

<option value="B+">B+</option>
<option value="B-">B-</option>

<option value="AB+">AB+</option>
<option value="AB-">AB-</option>

</select>

<button class="clear-btn"
onclick="clearDonors()">
Clear All
</button>

</div>

<div id="donorList"></div>

<script>

let donors =
JSON.parse(localStorage.getItem("donors")) || [];

let donorList =
document.getElementById("donorList");

function displayDonors(data){

  donorList.innerHTML = "";

  if(data.length === 0){

    donorList.innerHTML = `
      <h2 style="text-align:center;color:gray;">
        No donors found
      </h2>
    `;

    return;

  }

  data.forEach(function(donor){

    donorList.innerHTML += `

      <div class="donor">

        <h2>${donor.name} - ${donor.blood}</h2>

        <p>📍 ${donor.location}</p>

        <p>📞 ${donor.phone}</p>

      <button class="request-btn"
onclick="requestBlood('${donor.name}','${donor.blood}')">

  Request Blood

</button>
      </div>

    `;

  });

}

function filterDonors(){

  let selected =
  document.getElementById("bloodFilter").value;

  if(selected === "all"){

    displayDonors(donors);

  }else{

    let filtered =
    donors.filter(donor =>
    donor.blood === selected);

    displayDonors(filtered);

  }

}
function requestBlood(name,blood){

  let patientName =
  prompt("Enter Patient Name");

  if(!patientName) return;

  let hospital =
  prompt("Enter Hospital Name");

  if(!hospital) return;

  let phone =
  prompt("Enter Phone Number");

  if(!phone) return;

  let message = `

🩸 EMERGENCY BLOOD REQUEST

Donor Name: ${name}
Blood Group: ${blood}

Patient Name: ${patientName}

Hospital: ${hospital}

Contact: ${phone}

Please respond immediately and help save a life ❤️

`;

  alert(message);

  let requests =
  JSON.parse(localStorage.getItem("requests")) || [];

  requests.push({

    donor:name,
    blood:blood,
    patient:patientName,
    hospital:hospital,
    phone:phone,
    message:message

  });

  localStorage.setItem(
    "requests",
    JSON.stringify(requests)
  );

  alert("Blood Request Sent Successfully ❤️");

}


function clearDonors(){

  localStorage.removeItem("donors");

  donors = [];

  displayDonors([]);

  alert("All donors deleted ❤️");

}

displayDonors(donors);

</script>

</body>
</html>
