<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nearby Hospitals - LifeLink</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  background:#0f0f0f;
  color:white;
  font-family:Poppins,sans-serif;
  padding:40px;
}

h1{
  text-align:center;
  color:#ff3b3b;
  margin-bottom:30px;
}

.search-box{
  max-width:600px;
  margin:auto;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#1a1a1a;
  color:white;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  background:#ff3b3b;
  color:white;
  font-size:18px;
  cursor:pointer;
}

iframe{
  width:100%;
  height:500px;
  border:none;
  border-radius:20px;
  margin-top:30px;
}

</style>

</head>

<body>

<h1>🏥 Find Nearby Hospitals</h1>

<div class="search-box">

<input type="text"
id="location"
placeholder="Enter your area or city">

<button onclick="searchHospital()">
Search Hospitals
</button>

</div>

<div id="map"></div>

<script>

function searchHospital(){

  let location =
  document.getElementById("location").value;

  if(location === ""){

    alert("Please enter location ❤️");

    return;

  }

  let map =
  document.getElementById("map");

  map.innerHTML = `

  <iframe
  src="https://www.google.com/maps?q=hospitals+near+${location}&output=embed">
  </iframe>

  `;

}

</script>

</body>
</html>
