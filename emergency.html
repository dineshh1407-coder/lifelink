<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Emergency - LifeLink</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body{
      background:#0f0f0f;
      color:white;
      font-family:Poppins,sans-serif;
      padding:40px;
    }

    h1{
      text-align:center;
      color:#ff3b3b;
      margin-bottom:30px;
    }

    .box{
      max-width:500px;
      margin:auto;
      background:#1a1a1a;
      padding:30px;
      border-radius:20px;
    }

    input,select{

      width:100%;
      padding:15px;
      margin:12px 0;
      border:none;
      border-radius:12px;
      background:#2a2a2a;
      color:white;

    }

    button{

      width:100%;
      padding:15px;
      border:none;
      border-radius:30px;
      background:#ff3b3b;
      color:white;
      font-size:18px;
      cursor:pointer;
      margin-top:15px;

    }

    .request-card{

      background:#1a1a1a;
      padding:25px;
      border-radius:20px;
      margin-top:30px;

    }

    .request-card h2{
      color:#ff3b3b;
      margin-bottom:10px;
    }

  </style>

</head>

<body>

  <h1>🚨 Emergency Request</h1>

  <div class="box">

    <input type="text" id="name"
    placeholder="Patient Name">

    <input type="text" id="phone"
    placeholder="Phone Number">

    <input type="text" id="location"
    placeholder="Location">

    <select id="emergencyType">

      <option>Select Emergency</option>

      <option>Blood Needed</option>

      <option>Emergency Transport</option>

      <option>Medical Help</option>

    </select>

    <button onclick="sendEmergency()">
      Send Emergency Alert
    </button>

  </div>

  <div id="requests"></div>
  <h2 style="margin-top:40px;color:#ff3b3b;">
  Blood Requests
</h2>

<div id="bloodRequests"></div>

  <script>

    function sendEmergency(){

      let name =
      document.getElementById("name").value;

      let phone =
      document.getElementById("phone").value;

      let location =
      document.getElementById("location").value;

      let type =
      document.getElementById("emergencyType").value;

      let requestCard = `

        <div class="request-card">

          <h2>🚨 ${type}</h2>

          <p><strong>Patient:</strong> ${name}</p>

          <p><strong>Phone:</strong> ${phone}</p>

          <p><strong>Location:</strong> ${location}</p>

          <p style="color:red;">
            Emergency Alert Sent To Nearby Volunteers
          </p>

        </div>

      `;

      document.getElementById("requests")
      .innerHTML += requestCard;

    let emergencyMessage = `

🚨 EMERGENCY ALERT ACTIVATED

Your emergency request has been successfully sent to nearby volunteers and medical supporters.

Our LifeLink network is now searching for immediate assistance near your location.

Please stay available on your phone for response updates.

❤️ LifeLink Emergency Support

`;

alert(emergencyMessage);

    }
    let bloodRequests =
JSON.parse(localStorage.getItem("requests")) || [];

let requestContainer =
document.getElementById("bloodRequests");

bloodRequests.forEach(function(req){

  requestContainer.innerHTML += `

  <div class="request-card">

    <h2>🩸 ${req.blood} Blood Needed</h2>

    <p><strong>Donor:</strong> ${req.donor}</p>

    <p><strong>Patient:</strong> ${req.patient}</p>

    <p><strong>Hospital:</strong> ${req.hospital}</p>

    <p><strong>Phone:</strong> ${req.phone}</p>

  </div>

  `;

});

  </script>

</body>
</html>
