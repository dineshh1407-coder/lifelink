<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register - LifeLink</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Poppins,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.box{
  width:400px;
  background:#1a1a1a;
  padding:40px;
  border-radius:25px;
}

h1{
  text-align:center;
  color:#ff3b3b;
  margin-bottom:30px;
}

input,select{
  width:100%;
  padding:15px;
  margin:12px 0;
  border:none;
  border-radius:12px;
  background:#2a2a2a;
  color:white;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  background:#ff3b3b;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin-top:20px;
}

</style>

</head>

<body>

<div class="box">

<h1>❤️ Become Donor</h1>

<input type="text"
id="name"
placeholder="Full Name">

<input type="text"
id="phone"
placeholder="Phone Number">

<select id="blood">

<option value="">
Select Blood Group
</option>

<option>O+</option>
<option>O-</option>

<option>A+</option>
<option>A-</option>

<option>B+</option>
<option>B-</option>

<option>AB+</option>
<option>AB-</option>

</select>

<input type="text"
id="location"
placeholder="Location">

<button onclick="registerDonor()">
Register
</button>

</div>

<script>

function registerDonor(){

  let name =
  document.getElementById("name").value;

  let phone =
  document.getElementById("phone").value;

  let blood =
  document.getElementById("blood").value;

  let location =
  document.getElementById("location").value;

  if(name === "" ||
     phone === "" ||
     blood === "" ||
     location === ""){

    alert("Please fill all details ❤️");

    return;

  }

  let donors =
  JSON.parse(localStorage.getItem("donors")) || [];

  let exists =
  donors.find(d => d.phone === phone);

  if(exists){

    alert("Donor already registered ❤️");

    return;

  }

  let donor = {

    name:name,
    phone:phone,
    blood:blood,
    location:location

  };

  donors.push(donor);

  localStorage.setItem(
    "donors",
    JSON.stringify(donors)
  );

  alert("Registration Successful ❤️");

  window.location.href =
  "donors.html";

}

</script>

</body>
</html>
