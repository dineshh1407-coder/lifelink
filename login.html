<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - LifeLink</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f0f0f;
      font-family:Poppins,sans-serif;
      color:white;
    }

    .login-box{
      width:350px;
      background:#1a1a1a;
      padding:40px;
      border-radius:25px;
      text-align:center;
      box-shadow:0 0 30px rgba(255,0,0,0.2);
    }

    h1{
      color:#ff3b3b;
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:15px;
      margin:15px 0;
      border:none;
      outline:none;
      border-radius:12px;
      background:#2a2a2a;
      color:white;
      font-size:16px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:30px;
      background:#ff3b3b;
      color:white;
      font-size:17px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#ff1f1f;
    }

  </style>

</head>

<body>

  <div class="login-box">

    <h1>❤️ LifeLink</h1>

    <input type="text" placeholder="Enter Phone Number">

    <input type="password" placeholder="Enter Password">

    <button onclick="loginUser()">
      Login
    </button>

  </div>

  <script>

    function loginUser(){

      alert("Login Successful ❤️");

      window.location.href = "index.html";

    }

  </script>

</body>
</html>
